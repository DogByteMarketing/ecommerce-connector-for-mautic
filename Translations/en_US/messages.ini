mautic.plugin.ecommerce.install.script_heading="Browser tracking (script injection)"
mautic.plugin.ecommerce.install.script_intro="Enable <strong>Track orders from page hits</strong> on the General tab, then send order data from your thank-you page using Mautic tracking (<code>mtc.js</code>). Orders are recorded when <code>mt('send', 'pageview', ...)</code> includes <code>order_id</code> and <code>order_total</code>."
mautic.plugin.ecommerce.install.script_mtcjs_note="Make sure <code>mtc.js</code> is set up on your thank-you page before using the script below. The <code>mt()</code> function must be available, for example via WP Mautic, a Mautic landing page, or a tracking snippet added to your theme."
mautic.plugin.ecommerce.install.script_wordpress_heading="WordPress and WooCommerce"
mautic.plugin.ecommerce.install.script_wordpress_intro="If you use WordPress with WooCommerce, install our %link% plugin and the official WP Mautic plugin."
mautic.plugin.ecommerce.install.script_wordpress_details="On the General tab, set Active to Yes and enable <strong>Track orders from page hits</strong>. Configure the Validation and Formatting tabs as needed, then enable WooCommerce Order Tracking in Sync Mautic settings. Sync Mautic adds order fields to the standard WP Mautic pageview automatically on the order confirmation page."
mautic.plugin.ecommerce.install.script_custom_title="Custom thank-you page script"
mautic.plugin.ecommerce.install.script_custom_body="Add this script to your order confirmation page after Mautic tracking (<code>mtc.js</code>) is already loaded. Replace the example order values with real order data:"
mautic.plugin.ecommerce.install.script_example_note="Use a unique order_id for each order. The visitor needs a Mautic tracking cookie (for example from a Mautic email link or WP Mautic browsing session)."
mautic.plugin.ecommerce.install.webhook_heading="Signed webhook"
mautic.plugin.ecommerce.install.webhook_intro="For Shopify, custom apps, or any platform, send signed POST requests from your server when an order completes. Never put your webhook secret in browser JavaScript."
mautic.plugin.ecommerce.install.webhook_security_note="Send webhook requests only from your server backend. Keep your webhook secret out of client-side code."
